name: Reproduce sudo JDK fallback (actions/setup-java#997)

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # JOB 1: Reproduce the bug
  # Expected: setup-java sets JDK 25, but sudo falls back to JDK 17
  # ---------------------------------------------------------------
  reproduce-bug:
    name: "­¤Éø Reproduce: sudo falls back to wrong JDK"
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Ō£ģ Normal java version (should be 25)
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name:  sudo java version (BUG: falls back to system default JDK 17)
        run: |
          echo "--- Running: sudo java -version ---"
          sudo java -version
          echo ""
          echo "--- System java via sudo (shows the fallback path) ---"
          sudo which java

      - name: Show why: sudo resets PATH and JAVA_HOME
        run: |
          echo "User-level JAVA_HOME : $JAVA_HOME"
          echo "sudo JAVA_HOME       : $(sudo printenv JAVA_HOME || echo '<not set>')"
          echo "User-level PATH      : $PATH"
          echo "sudo PATH            : $(sudo printenv PATH)"

  # ---------------------------------------------------------------
  # JOB 2: Test all known workarounds
  # ---------------------------------------------------------------
  test-workarounds:
    name: "­¤ö¦ Test workarounds for sudo JDK fallback"
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Confirm non-sudo baseline (JDK 25)
        run: |
          echo "=== Baseline (no sudo) ==="
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      # ----------------------------------------------------------
      # Workaround 1: sudo -E  (preserve user environment)
      # ----------------------------------------------------------
      - name: "Workaround 1’ĖÅŌāŻ : sudo -E (preserve environment)"
        run: |
          echo "=== sudo -E java -version ==="
          sudo -E java -version
          echo ""
          echo "Expected: 25.x | sudo -E preserves JAVA_HOME and PATH"

      # ----------------------------------------------------------
      # Workaround 2: JAVACMD (recommended by @mahabaleshwars)
      # Best for ant / tools that use java-wrappers.sh
      # ----------------------------------------------------------
      - name: "Workaround 2’ĖÅŌāŻ : JAVACMD=$JAVA_HOME/bin/java"
        run: |
          export JAVACMD=$JAVA_HOME/bin/java
          echo "=== JAVACMD=$JAVACMD ==="
          sudo env JAVACMD=$JAVACMD JAVA_HOME=$JAVA_HOME $JAVACMD -version
          echo ""
          echo "Expected: 25.x | JAVACMD bypasses java-wrappers.sh re-detection"

      # ----------------------------------------------------------
      # Workaround 3: sudo env PATH=... JAVA_HOME=... java
      # Explicit env passthrough ŌĆö most portable
      # ----------------------------------------------------------
      - name: "Workaround 3’ĖÅŌāŻ : sudo env PATH=\$PATH JAVA_HOME=\$JAVA_HOME java"
        run: |
          echo "=== sudo env PATH=\$PATH JAVA_HOME=\$JAVA_HOME java -version ==="
          sudo env PATH=$PATH JAVA_HOME=$JAVA_HOME java -version
          echo ""
          echo "Expected: 25.x | Explicitly passes env vars into sudo context"

      # ----------------------------------------------------------
      # Summary: Which workaround would you use?
      # ----------------------------------------------------------
      - name: "­¤ōŗ Summary"
        run: |
          echo "==========================================="
          echo "  Workaround Comparison for sudo + JDK"
          echo "==========================================="
          echo ""
          echo "1. sudo -E                          ŌåÆ Simple, preserves entire env. Best for most cases."
          echo "2. JAVACMD=\$JAVA_HOME/bin/java      ŌåÆ Needed when using apt-installed ant (java-wrappers.sh)."
          echo "3. sudo env PATH=\$PATH JAVA_HOME=\$JAVA_HOME java  ŌåÆ Explicit, portable, minimal env bleed."
          echo ""
          echo "Root cause: Ubuntu sudoers env_reset + secure_path strips user-level env vars."
          echo "See: https://github.com/actions/setup-java/issues/997"
